esphome:
  name: rain-gauge
  friendly_name: Rain Gauge
  on_boot:
    priority: -100
    then:
      - delay: 2s
      - lambda: |-
          auto now = id(sntp_time).now();
          if (now.is_valid()) {
            id(last_rain_today_reset_day) = now.day_of_year;
          }

          float a = id(bucket_angle).state;

          if (!isnan(a)) {
            if (a < 25.0) {
              id(last_bucket_side) = -1;
            } else if (a > 55.0) {
              id(last_bucket_side) = 1;
            } else {
              id(last_bucket_side) = 0;
            }
          } else {
            id(last_bucket_side) = 0;
          }

          ESP_LOGI("rain", "Bucket initialized, side=%d", id(last_bucket_side));
          id(boot_ready) = true;

esp32:
  board: esp32dev

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Bucharest


globals:
  - id: boot_ready
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_bucket_side
    type: int
    restore_value: no
    initial_value: '0'
    # -1 = right, 0 = center/unknown, 1 = left

  - id: total_tips
    type: int
    restore_value: yes
    initial_value: '0'

  - id: total_rain_mm
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: rain_today_mm
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: mm_per_tip
    type: float
    restore_value: no
    initial_value: '0.39275'
    # 1 basculare stanga/dreapta = 0.3275 mm
    # calibrare: palnie 180 mm, 100 ml = 12 basculari

  - id: last_rain_today_reset_day
    type: int
    restore_value: yes
    initial_value: '0'

  # Buffer circular pentru ultimele 24h.
  # Nu il facem persistent, ca sa evitam probleme ESPHome cu array restore.
  - id: rain_24h_buffer
    type: float[1440]
    restore_value: no

  - id: rain_24h_index
    type: int
    restore_value: yes
    initial_value: '0'

  - id: rain_current_minute_mm
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: rain_last_24h_mm
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: rain_rate_mm_h
    type: float
    restore_value: no
    initial_value: '0.0'

sensor:
  # LX analog OUT -> GPIO35
  # ESP32 nu accepta 5V direct pe ADC.
  # Recomandat: LX OUT --10k-- GPIO35 --20k-- GND
  - platform: adc
    pin: GPIO35
    name: "Rain Bucket Voltage"
    id: bucket_voltage
    internal: true    
    attenuation: 12db
    update_interval: 100ms
    accuracy_decimals: 3
    filters:
      - multiply: 1.5

  - platform: template
    name: "Rain Bucket Angle"
    id: bucket_angle
    internal: true    
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: 100ms
    lambda: |-
      float v = id(bucket_voltage).state;
      if (isnan(v)) return NAN;

      // Calibrare:
      // Right max: 14° = 0.57V
      // Center:    41° = 1.70V
      // Left max:  68° = 2.85V
      return v * 23.86 + 0.4;

  - platform: template
    name: "Rain Total"
    id: rain_total
    unit_of_measurement: "mm"
    device_class: precipitation
    state_class: total_increasing
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      return id(total_rain_mm);

  - platform: template
    name: "Rain Today"
    id: rain_today
    unit_of_measurement: "mm"
    device_class: precipitation
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      return id(rain_today_mm);

  - platform: template
    name: "Rain Last 24h"
    id: rain_last_24h
    unit_of_measurement: "mm"
    device_class: precipitation
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      return id(rain_last_24h_mm);

  - platform: template
    name: "Rain Rate"
    id: rain_rate
    unit_of_measurement: "mm/h"
    device_class: precipitation_intensity
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      return id(rain_rate_mm_h);

  - platform: template
    name: "Rain Total Tips"
    id: rain_total_tips
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(total_tips);

text_sensor:
  - platform: template
    name: "Rain Bucket Side"
    id: bucket_side
    update_interval: 500ms
    lambda: |-
      float a = id(bucket_angle).state;
      if (isnan(a)) return {"Unknown"};

      if (a < 25) return {"Right"};
      if (a > 55) return {"Left"};
      return {"Center"};

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10


interval:
  # Detectie bucket
  - interval: 100ms
    then:
      - lambda: |-
          if (!id(boot_ready)) return;
          float a = id(bucket_angle).state;
          if (isnan(a)) return;

          const float RIGHT_THRESHOLD = 25.0;
          const float LEFT_THRESHOLD  = 55.0;

          bool tip_detected = false;

          if (a < RIGHT_THRESHOLD && id(last_bucket_side) != -1) {
            id(last_bucket_side) = -1;
            tip_detected = true;
            ESP_LOGI("rain", "Tip RIGHT");
          }

          if (a > LEFT_THRESHOLD && id(last_bucket_side) != 1) {
            id(last_bucket_side) = 1;
            tip_detected = true;
            ESP_LOGI("rain", "Tip LEFT");
          }

          if (tip_detected) {
            float mm = id(mm_per_tip);

            id(total_tips) += 1;
            id(total_rain_mm) += mm;
            id(rain_today_mm) += mm;
            id(rain_current_minute_mm) += mm;

            ESP_LOGI("rain", "tips=%d total=%.2f today=%.2f",
                     id(total_tips), id(total_rain_mm), id(rain_today_mm));
          }

  # Rain Rate + Last 24h, actualizat la fiecare minut
  - interval: 60s
    then:
      - lambda: |-
          id(rain_rate_mm_h) = id(rain_current_minute_mm) * 60.0;

          int idx = id(rain_24h_index);

          id(rain_last_24h_mm) -= id(rain_24h_buffer)[idx];
          id(rain_24h_buffer)[idx] = id(rain_current_minute_mm);
          id(rain_last_24h_mm) += id(rain_current_minute_mm);

          idx++;
          if (idx >= 1440) {
            idx = 0;
          }
          id(rain_24h_index) = idx;

          id(rain_current_minute_mm) = 0.0;

  # Reset automat Rain Today la schimbarea zilei
  - interval: 30s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          int day = now.day_of_year;

          if (id(last_rain_today_reset_day) == 0) {
            id(last_rain_today_reset_day) = day;
            return;
          }

          if (day != id(last_rain_today_reset_day)) {
            id(rain_today_mm) = 0.0;
            id(last_rain_today_reset_day) = day;
            ESP_LOGI("rain", "Rain Today reset");
          }

button:
  - platform: template
    name: "Reset Rain Total"
    on_press:
      - lambda: |-
          id(total_tips) = 0;
          id(total_rain_mm) = 0.0;
          id(rain_today_mm) = 0.0;
          id(rain_last_24h_mm) = 0.0;
          id(rain_current_minute_mm) = 0.0;
          id(rain_rate_mm_h) = 0.0;
          id(rain_24h_index) = 0;

          for (int i = 0; i < 1440; i++) {
            id(rain_24h_buffer)[i] = 0.0;
          }

          float a = id(bucket_angle).state;

          if (!isnan(a)) {
            if (a < 25.0) {
              id(last_bucket_side) = -1;
            } else if (a > 55.0) {
              id(last_bucket_side) = 1;
            } else {
              id(last_bucket_side) = 0;
            }
          } else {
            id(last_bucket_side) = 0;
          }
